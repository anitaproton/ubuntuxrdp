[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:dbus]
command=dbus-daemon --system --nofork
autorestart=true
priority=1

[program:xrdp-sesman]
command=/usr/sbin/xrdp-sesman --nodaemon
autorestart=true
priority=2

[program:xrdp]
command=/usr/sbin/xrdp --nodaemon
autorestart=true
priority=3
